  /* ── Scroll fix ── */
  html, body {
    height: auto !important;
    overflow: auto !important;
    overflow-x: hidden !important;
  }
  #void, main {
    height: auto !important;
    min-height: unset !important;
    overflow: visible !important;
  }
  #space {
    position: fixed !important;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    pointer-events: none;
  }

  
  /* ── Hover: scoped to folder graphic only ── */
  .folder-svg-wrap {
    overflow: visible !important;
    perspective: 300px;
    perspective-origin: center center;
  }

  .mac-folder {
    transform-style: preserve-3d;
    overflow: visible;
  }

  /* Hide db icon for ALL folders on hover over folder graphic */
  .folder-db-icon {
    transition: opacity 0.18s ease, visibility 0.18s ease;
    opacity: 1;
    visibility: visible;
  }
  .folder-svg-wrap:hover .folder-db-icon {
    opacity: 0;
    visibility: hidden;
  }

  /* Front flap tilts only when hovering folder graphic */
  .folder-item .front-flap-group {
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center bottom;
    transform: rotateX(0deg);
  }
  .folder-svg-wrap:hover .front-flap-group {
    transform-origin: center bottom;
    transform: rotateX(-25deg);
  }

  /* White paper rise on click */
  .white-paper {
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .folder-item.clicking .white-paper {
    transform: translateY(-18px);
  }

  /* Smooth path morph on flap paths */
  .front-flap-group .front-flap {
    transition: d 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* SQL badge shine on click */
  .sql-badge-text,
  .sql-badge-border {
    transition: fill 0.3s, stroke 0.3s, filter 0.3s, transform 0.3s;
    transform-origin: center;
  }
  .folder-item.clicking .sql-badge-text {
    fill: #a0a0a0;
    filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.9)) drop-shadow(1px -1px 4px rgba(200,200,255,0.8));
  }
  .folder-item.clicking .sql-badge-border {
    stroke: #a0a0a0;
    filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.9)) drop-shadow(1px -1px 4px rgba(200,200,255,0.8));
  }
</style>
<script>
  // Normal path (rectangle with rounded top corners)
  const FLAP_NORMAL = "M9,26 L79,26 Q84,26 84,31 L84,79 L4,79 L4,31 Q4,26 9,26 Z";
  // Hover path: top widens 5px each side, bottom stays same (x=4 to x=84)
  const FLAP_HOVER  = "M-1,26 L89,26 L84,79 L4,79 Z";

  function setFlapPaths(folderItem, pathD) {
    folderItem.querySelectorAll('.front-flap').forEach(p => p.setAttribute('d', pathD));
  }

  // Clear any leftover clicking/hover state (handles bfcache restore on back navigation)
  function clearClickingState() {
    document.querySelectorAll('.folder-item.clicking').forEach(el => {
      el.classList.remove('clicking');
    });
    // Reset all flap paths and transforms back to normal state
    document.querySelectorAll('.folder-item').forEach(item => {
      setFlapPaths(item, FLAP_NORMAL);
      // Force reset the front-flap-group rotateX so hover works again after bfcache restore
      item.querySelectorAll('.front-flap-group').forEach(group => {
        group.style.transition = 'none';
        group.style.transform = 'rotateX(0deg)';
        // Re-enable transition after a frame so it animates normally on next hover
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            group.style.transition = '';
            group.style.transform = '';
          });
        });
      });
    });
  }

  function applyHoverToElementUnderCursor() {
    document.querySelectorAll('.folder-svg-wrap').forEach(wrap => {
      const item = wrap.closest('.folder-item');
      const rect = wrap.getBoundingClientRect();
      if (
        window._mouseX >= rect.left && window._mouseX <= rect.right &&
        window._mouseY >= rect.top  && window._mouseY <= rect.bottom
      ) {
        setFlapPaths(item, FLAP_HOVER);
      } else {
        setFlapPaths(item, FLAP_NORMAL);
      }
    });
  }

  // Track mouse position globally at all times
  document.addEventListener('mousemove', (e) => {
    window._mouseX = e.clientX;
    window._mouseY = e.clientY;
  });

  document.addEventListener('DOMContentLoaded', () => {
    clearClickingState();

    // Hover: scope to folder-svg-wrap only
    document.querySelectorAll('.folder-svg-wrap').forEach(wrap => {
      const item = wrap.closest('.folder-item');
      wrap.addEventListener('mouseenter', () => setFlapPaths(item, FLAP_HOVER));
      wrap.addEventListener('mouseleave', () => setFlapPaths(item, FLAP_NORMAL));
    });

    // Click: white paper rises, then navigate — scoped to folder-svg-wrap only
    document.querySelectorAll('a.folder-item .folder-svg-wrap').forEach(wrap => {
      wrap.addEventListener('click', function(e) {
        e.preventDefault();
        const link = this.closest('a.folder-item');
        const href = link.getAttribute('href');
        link.classList.add('clicking');
        setTimeout(() => {
          window.location.href = href;
        }, 400);
      });
    });
  });

  // Fires when page is restored from bfcache (browser back/forward)
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      clearClickingState();
      // If cursor is already over a folder (no mouseenter fires on restore), apply hover manually
      requestAnimationFrame(() => applyHoverToElementUnderCursor());
    }
  });
</script>
