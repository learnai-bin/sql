<style>
  .main-wrap {
    width: 90%;
    max-width: 780px;
    margin: 6rem auto 3rem;
    padding: 0;
    border-radius: 20px;
    overflow: visible;
    box-shadow: 0 8px 48px rgba(0,0,0,0.18);
  }

  .map-header {
    background: #ffffff;
    padding: 2rem 2.2rem 1.2rem;
    border-bottom: 1px solid #efefef;
  }
  .map-header-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #b0b0b8;
    margin-bottom: 0.3rem;
  }
  .map-header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.14em;
    color: #1a1a2e;
  }

  .topic-list {
    background: #ffffff;
    padding: 1.8rem 2rem 2rem;
  }

  .folder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 1.8rem 1rem;
  }

  .folder-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .folder-item.locked { cursor: default; }

  .folder-svg-wrap {
    position: relative;
    width: 82px;
    height: 76px;
  }

  .mac-folder {
    width: 82px;
    height: 76px;
    
  }

  .folder-db-icon {
    position: absolute;
    bottom: 3px;
    right: 0px;
    width: 28px;
    height: 28px;
    background: #fff;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.22);
  }
  .folder-db-icon svg {
    width: 17px;
    height: 17px;
  }

  .folder-label {
    font-family: "Manrope", sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: #1a1a2e;
    text-align: center;
    line-height: 1.3;
    max-width: 96px;
    word-break: break-word;
  }



  /* ── Scroll fix ── */
  html, body {
    height: auto !important;
    overflow: auto !important;
    overflow-x: hidden !important;
  }
  #void, main {
    height: auto !important;
    min-height: unset !important;
    overflow: visible !important;
  }
  #space {
    position: fixed !important;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    pointer-events: none;
  }
</style>
